name: Deploy to squish.keanuc.net

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build production bundle
        run: ./gradlew jsBrowserProductionWebpack

      - name: Deploy to VPS then relay to Unraid
        uses: appleboy/ssh-action@v1
        env:
          UNRAID_IP: "100.85.82.61"
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: UNRAID_IP
          script: |
            mkdir -p /tmp/squish-deploy

      - name: Copy built files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "build/dist/js/productionExecutable/*"
          target: "/tmp/squish-deploy"
          strip_components: 4

      - name: Relay to Unraid and restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            ssh -o StrictHostKeyChecking=no root@100.85.82.61 "mkdir -p /mnt/user/appdata/squish-space/dist"
            scp -o StrictHostKeyChecking=no -r /tmp/squish-deploy/* root@100.85.82.61:/mnt/user/appdata/squish-space/dist/
            ssh -o StrictHostKeyChecking=no root@100.85.82.61 "cd /mnt/user/appdata/komodo/stacks/squish-space && docker compose up -d --force-recreate 2>/dev/null || docker run -d --name squish-space --restart unless-stopped -p 8901:80 -v /mnt/user/appdata/squish-space/dist:/usr/share/nginx/html:ro nginx:alpine"
            rm -rf /tmp/squish-deploy
